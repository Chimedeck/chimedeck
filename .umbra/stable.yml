name: Deploy to stable

on:
  push:
    branches:
      - stable

env:
  ENV: production
  DEPLOYMENT_MODE: asg-bluegreen
  USE_SSM_DEPLOYMENT: "TRUE"
  ENV_NAME: production
  AWS_ACCESS_KEY_ID: ${{ secrets.STABLE_AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.STABLE_AWS_SECRET_ACCESS_KEY }}
  AWS_ACCOUNT_ID: ${{ secrets.STABLE_AWS_ACCOUNT_ID }}
  AWS_ECR_REGION: ${{ secrets.STABLE_AWS_ECR_REGION }}
  AWS_ECR_REPO_NAME: ${{ secrets.STABLE_AWS_ECR_REPO_NAME }}
  AWS_JH_ENV_SECRET_NAME: ${{ secrets.STABLE_AWS_JH_ENV_SECRET_NAME }}
  AWS_ENV_USER_ACCESS_KEY_ID: ${{ secrets.PRODUCTION_AWS_ENV_USER_ACCESS_KEY_ID }}
  AWS_ENV_USER_SECRET_ACCESS_KEY: ${{ secrets.PRODUCTION_AWS_ENV_USER_SECRET_ACCESS_KEY }}
  AWS_ENV_USER_REGION: ${{ secrets.PRODUCTION_AWS_ENV_USER_REGION }}
  AWS_ECR_TAG_NAME: ${{ secrets.PRODUCTION_AWS_ECR_TAG_NAME }}
  # Terraform state backend
  TF_STATE_BUCKET: ${{ secrets.STABLE_TF_STATE_BUCKET }}
  # Run DB migrations against RDS before slot flip
  USE_RDS: "TRUE"
  # SSM deployment targets — format: "<instance-id>:<region>", comma-separated for multiple
  # e.g. "i-0abc1234567890def:us-east-1" or "i-0abc1234567890def:us-east-1,i-0fed9876543210abc:eu-west-1"
  AWS_INSTANCE_IDS: ${{ secrets.STABLE_AWS_INSTANCE_IDS }}
  AWS_INSTANCE_DEPLOY_SCRIPT: ${{ secrets.STABLE_AWS_INSTANCE_DEPLOY_SCRIPT }}

jobs:
  deploy:
    builder:
      - ubuntu
      - docker
      - aws
    steps:
      - uses: checkout
      - name: Build Docker image and push to ECR
        run: ./scripts/build.sh
      - name: Multi instance deployment via SSM
        run: ./scripts/deploy.stable.sh