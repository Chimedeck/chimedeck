version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://kanban:kanban@postgres:5432/kanban}
      REDIS_URL: ${REDIS_URL:-}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localstack:4566}
      S3_BUCKET: ${S3_BUCKET:-kanban}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-test}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-test}
      APP_PORT: ${APP_PORT:-3000}
      FLAG_USE_REDIS: ${FLAG_USE_REDIS:-false}
      FLAG_VIRUS_SCAN_ENABLED: ${FLAG_VIRUS_SCAN_ENABLED:-false}
      FEATURE_FLAGS_PROVIDER: ${FEATURE_FLAGS_PROVIDER:-}
      FEATURE_FLAGS_JSON_PATH: ${FEATURE_FLAGS_JSON_PATH:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanban
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: [redis]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  localstack_data:
