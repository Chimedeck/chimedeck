name: taskinate-dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules         # preserve container node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_USER: taskinate
      POSTGRES_PASSWORD: taskinate
      POSTGRES_DB: taskinate_dev
    command: >
      postgres -c shared_preload_libraries=pg_cron
               -c cron.database_name=taskinate_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskinate"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-taskinate}
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init/ready.d:/etc/localstack/init/ready.d:ro

  redis:
    image: redis:7-alpine
    profiles: [redis]         # optional — only started with --profile redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  localstack_data:
